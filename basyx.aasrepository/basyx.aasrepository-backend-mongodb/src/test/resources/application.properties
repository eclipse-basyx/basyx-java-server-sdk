# Do NOT change any port while running in a Docker container.
# Changing this will make the service unreachable from outside the container.
# The port should only be changed when the application is not running.
basyx.backend = MongoDB
basyx.aasrepository.mongodb.collectionName= testAasCollection

spring.data.mongodb.host=127.0.0.1
spring.data.mongodb.port=27017
spring.data.mongodb.database=aas-env
spring.data.mongodb.authentication-database=admin
spring.data.mongodb.username=mongoAdmin
spring.data.mongodb.password=mongoPassword