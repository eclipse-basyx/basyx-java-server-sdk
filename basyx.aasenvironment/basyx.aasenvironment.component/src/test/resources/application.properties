# Do NOT change any port while running in a Docker container.
# Changing this will make the service unreachable from outside the container.
# The port should only be changed when the application is not running.
server.port=8080
spring.application.name=AAS Environment

basyx.backend = InMemory

basyx.environment = classpath:testEnvironments,classpath:testEnvironment.json,classpath:testEnvironment.xml,classpath:testEnvironment.aasx
